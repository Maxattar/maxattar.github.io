<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maxattar.com</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Instrument Sans', sans-serif; background: #0d2e1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); margin-bottom: 0.5rem; }
  p { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 2.5rem; }
  .links { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 20px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; transition: transform .15s, opacity .15s; }
  .btn:hover { transform: translateY(-2px); opacity: .9; }
  .btn-green { background: #2d9e5a; color: #fff; }
  .btn-yellow { background: #FFDD00; color: #000; }
  footer { position: fixed; bottom: 1.5rem; font-size: 12px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
  <h1>⛳ maxattar</h1>
  <p>Projets golf & développement</p>
  <div class="links">
    <a class="btn btn-green" href="/inscription-gp/">Inscriptions et départs des compétitions fédérales ⛳</a>
    <a class="btn btn-yellow" href="https://buymeacoffee.com/maxattar" target="_blank" rel="noopener">Pour soutenir les projets🙏</a>
  </div>
  <footer>maxattar.com</footer>
</body>
</html>
